project:
  type: website
  output-dir: _site
  # Only the current article (v2) builds. The earlier "Threat Models" (v1)
  # and "Archetypes" drafts and their chapters stay in the repo as reference
  # material, but are excluded from the rendered site.
  render:
    - index.qmd
    - pages/threat-models-v2.qmd

website:
  title: "AI Doom Debate Map"
  navbar:
    left:
      - text: "Threat Models"
        href: pages/threat-models-v2.qmd
    right:
      - icon: github
        href: https://github.com/JTuffy/doom-debate-archetypes

format:
  html:
    theme: cosmo
    css: styles.css
    include-after-body: _meta-toggle.html
    toc: true
    toc-location: left
    toc-depth: 3
    toc-expand: 1
    number-sections: false
    reference-location: margin
    citation-location: margin
    footnotes-hover: true
    smooth-scroll: true
    fontsize: 1.05em
    linestretch: 1.6
    max-width: 850px
